<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
    <linearGradient id="chevGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Subtle top border accent -->
  <rect width="1200" height="6" fill="url(#chevGrad)"/>

  <!-- Chevrons - scaled up, left-center -->
  <g transform="translate(120, 230) scale(5)">
    <path d="M 0 50 L 20 30 L 40 50 L 20 40 Z" fill="#2563EB"/>
    <path d="M 25 50 L 45 30 L 65 50 L 45 40 Z" fill="#4F46E5" opacity="0.85"/>
    <path d="M 50 50 L 70 30 L 90 50 L 70 40 Z" fill="#7C3AED" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="120" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="100" font-weight="700" fill="#0F172A" letter-spacing="-3">flockr</text>
  <text x="594" y="460" font-family="'Helvetica Neue', Arial, sans-serif" font-size="100" font-weight="300" fill="#64748B" letter-spacing="-3">labs</text>

  <!-- Tagline -->
  <text x="120" y="530" font-family="'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="400" fill="#94A3B8" letter-spacing="0">Custom software for businesses outgrowing SaaS</text>
</svg>
